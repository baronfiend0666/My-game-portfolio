<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게임기획 포트폴리오</title>
    <style>
        /* 기본 여백 제거 및 배경색 검정 설정 */
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* 유튜브 영상을 화면 전체 배경으로 고정 */
        .video-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; /* 마우스로 영상 클릭이나 일시정지하는 것을 방지 */
            z-index: -1; /* 영상을 글자 뒤로 배치 */
        }
        
        /* 유튜브 특유의 위아래 검은 여백을 없애기 위해 영상 크기를 약간 키움 */
        .video-background iframe {
            width: 100vw; height: 100vh;
            transform: scale(1.2); 
        }

        /* 메인 페이지로 넘어가는 입장 텍스트 디자인 */
        .enter-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 3rem;
            text-decoration: none;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* 영상 위에서 글자가 잘 보이도록 그림자 추가 */
            z-index: 1;
        }

        /* 마우스를 텍스트 위에 올렸을 때 색상 변화 */
        .enter-button:hover {
            color: #ffcc00; 
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/DylyvoDrq6c?autoplay=1&mute=1&loop=1&playlist=DylyvoDrq6c&controls=0&disablekb=1&modestbranding=1" 
                frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <a href="main.html" class="enter-button">포트폴리오 입장하기</a>

</body>
</html>
