<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게임기획 포트폴리오</title>
    <style>
        /* 기본 여백 제거 및 배경색 검정 설정 */
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* 유튜브 영상을 화면 전체 배경으로 고정 */
        .video-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; /* 영상 클릭/일시정지 방지 */
            z-index: -1; 
        }
        
        /* 여백을 없애기 위해 영상 크기를 약간 키움 */
        .video-background iframe {
            width: 100vw; height: 100vh;
            transform: scale(1.2); 
        }

        /* [수정됨] 하단 좌측으로 입장 텍스트(타이틀) 배치 */
        .enter-button {
            position: absolute;
            bottom: 50px; /* 화면 맨 아래에서 50px 띄움 */
            left: 50px;   /* 화면 왼쪽에서 50px 띄움 */
            color: #ffffff;
            font-size: 3rem;
            text-decoration: none;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9); /* 글자가 잘 보이도록 진한 그림자 */
            z-index: 1;
            transition: color 0.3s ease;
        }

        /* 마우스를 올렸을 때 색상 변화 */
        .enter-button:hover {
            color: #ffcc00; 
        }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/DylyvoDrq6c?autoplay=1&mute=1&loop=1&playlist=DylyvoDrq6c&controls=0&disablekb=1&modestbranding=1" 
                frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <a href="main.html" class="enter-button">게임기획 포트폴리오 입장</a>

</body>
</html>
